name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle 8.0
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android build tools
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" || true

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        run: find . -name "*.apk" -type f

      - name: Rename APK
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          cp "$APK" JeenyUltimateHelper.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeenyUltimateHelper-APK
          path: JeenyUltimateHelper.apk
          retention-days: 30
