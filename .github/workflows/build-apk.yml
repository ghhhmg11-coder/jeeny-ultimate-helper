name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Locate and rename APK
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          echo "Found: $APK"
          cp "$APK" JeenyUltimateHelper.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JeenyUltimateHelper-APK
          path: JeenyUltimateHelper.apk
          retention-days: 30
