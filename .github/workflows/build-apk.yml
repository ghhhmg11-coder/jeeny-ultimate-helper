name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '8.2' }
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2
      - uses: android-actions/setup-android@v3
      - name: Accept licenses & install platform
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"
      - name: Build Debug APK
        run: ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: jeeny-ultimate-helper-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
