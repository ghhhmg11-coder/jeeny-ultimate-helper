name: Build Signed Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias jeeny_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jeeny12345 \
            -keypass jeeny12345 \
            -dname "CN=JeenyUltimateHelper, OU=Dev, O=Jeeny, L=Riyadh, S=Riyadh, C=SA" \
            -keystore jeeny.keystore

      - name: Clean and Build Release APK
        run: |
          gradle clean assembleRelease --no-daemon --stacktrace

      - name: Find build-tools version
        run: |
          BT=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "BUILD_TOOLS=$BT" >> $GITHUB_ENV
          echo "Using build-tools: $BT"

      - name: Zipalign APK
        run: |
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app-release-aligned.apk

      - name: Sign APK with apksigner
        run: |
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks jeeny.keystore \
            --ks-pass pass:jeeny12345 \
            --key-pass pass:jeeny12345 \
            --ks-key-alias jeeny_key \
            --out JeenyUltimateHelper.apk \
            app-release-aligned.apk

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify --verbose JeenyUltimateHelper.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: JeenyUltimateHelper-Signed
          path: JeenyUltimateHelper.apk
          retention-days: 30
